name: smartcampus
description: SmartCampus Companion — Mobile OS Concepts Demonstration App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # Dependency Injection
  get_it: ^8.3.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.3

  # Secure Storage & Preferences
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.5

  # Local Database (offline cache)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Device Features
  local_auth: ^2.3.0
  geolocator: ^12.0.0
  image_picker: ^1.2.1
  permission_handler: ^11.4.0
  sensors_plus: ^5.0.1

  # Map (OpenStreetMap — free, no API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # UI
  google_fonts: ^6.3.3
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Export
  path_provider: ^2.1.5
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.6.4
  build_runner: ^2.4.10

flutter:
  uses-material-design: true